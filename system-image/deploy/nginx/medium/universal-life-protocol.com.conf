upstream ttc_runtime_sse {
    # Fano deployment point on large: runtime_sse
    server 74.208.190.29:8000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name universallifeprotocol.com www.universallifeprotocol.com universal-life-protocol.com www.universal-life-protocol.com universallifeprotocol.store universallifeprotocol.io universallifeprotocol.net;
    return 301 https://universallifeprotocol.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.universallifeprotocol.com universal-life-protocol.com www.universal-life-protocol.com universallifeprotocol.store universallifeprotocol.io universallifeprotocol.net;

    ssl_certificate /etc/letsencrypt/live/universallifeprotocol.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/universallifeprotocol.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://universallifeprotocol.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name universallifeprotocol.com;

    # Fano deployment points on medium:
    # - public_site
    # - browser_projection
    # - browser_narrative
    root /var/www/universal-life-protocol/current/demo;
    index browser/index.html;

    ssl_certificate /etc/letsencrypt/live/universallifeprotocol.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/universallifeprotocol.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = / {
        try_files /browser/index.html =404;
    }

    location /browser/ {
        try_files $uri $uri/ =404;
    }

    location /events {
        # medium browser roles speak to runtime_sse on large through this proxy.
        proxy_pass http://ttc_runtime_sse;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Enable only after the API service exists on large:8001.
    # Future Fano deployment point on large: api_service
    # location /api/ {
    #     proxy_pass http://74.208.190.29:8001/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
