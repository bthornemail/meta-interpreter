server {
    listen 80;
    listen [::]:80;
    server_name universallifeprotocol.com www.universallifeprotocol.com universal-life-protocol.com www.universal-life-protocol.com universallifeprotocol.store universallifeprotocol.io universallifeprotocol.net;

    # Fano deployment points on medium:
    # - public_site
    # - browser_projection
    # - browser_narrative
    root /var/www/universal-life-protocol/current/demo;
    index browser/index.html;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        allow all;
        root /var/www/universal-life-protocol/current/demo;
    }

    location / {
        if ($host != "universallifeprotocol.com") {
            return 301 http://universallifeprotocol.com$request_uri;
        }
        try_files $uri $uri/ /browser/index.html;
    }
}
