server {
    listen 80;
    listen [::]:80;
    server_name matroid-garden.com www.matroid-garden.com;

    # Fano deployment point on small:
    # - downloads
    root /var/www/universal-life-protocol-downloads/current;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        allow all;
        root /var/www/universal-life-protocol-downloads/current;
    }

    location / {
        if ($host != "matroid-garden.com") {
            return 301 http://matroid-garden.com$request_uri;
        }
        autoindex on;
        try_files $uri $uri/ =404;
    }
}
